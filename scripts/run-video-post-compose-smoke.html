<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>v191 保存時合成スモークテスト</title>
<style>
  body{max-width:620px;margin:30px auto;padding:0 18px;background:#f5f0e4;color:#24262b;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif}
  main{padding:20px;border:1px solid #b9b5aa;border-top:7px solid #34475b;background:#fbf8ef;box-shadow:0 5px 0 #d2ccbb}
  h1{font-size:21px} p{color:#6e706e;font-size:13px;line-height:1.6} button{width:100%;min-height:52px;border:1px solid #8f451e;background:#ae5a20;color:#fff;font:inherit;font-weight:800;box-shadow:0 4px 0 #753516}
  button:disabled{opacity:.45} progress{width:100%;height:18px;margin:16px 0} output{font-weight:800;font-variant-numeric:tabular-nums} video{display:block;width:100%;margin-top:15px;background:#000} #status[data-state="pass"]{color:#357041} #status[data-state="fail"]{color:#a1372e}
</style>
</head>
<body>
<main>
  <small>ROUTINE NOTE / LOCAL QA</small>
  <h1>保存時の映像＋音源合成</h1>
  <p>カメラ権限を使わず、短いテスト映像とテスト音を生成して、実際の保存時合成と同じ処理を確認します。</p>
  <button id="start" disabled>テスト素材を準備中…</button>
  <progress id="progress" max="1" value="0"></progress>
  <output id="status" data-state="preparing">準備中</output>
  <div id="metrics"></div>
  <video id="result" controls playsinline hidden></video>
</main>
<script src="../run-video-composition.js?v=176"></script>
<script>
"use strict";
const $start=document.getElementById("start"),$progress=document.getElementById("progress"),$status=document.getElementById("status"),$metrics=document.getElementById("metrics"),$result=document.getElementById("result");
let sourceCapture=null;
function preferredMime(){const c=["video/webm;codecs=vp8","video/webm","video/mp4"];return c.find(t=>MediaRecorder.isTypeSupported(t))||""}
function makeWav(seconds=3,sampleRate=16000){const count=Math.floor(seconds*sampleRate),buffer=new ArrayBuffer(44+count*2),view=new DataView(buffer);const str=(o,s)=>{for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i))};str(0,"RIFF");view.setUint32(4,36+count*2,true);str(8,"WAVEfmt ");view.setUint32(16,16,true);view.setUint16(20,1,true);view.setUint16(22,1,true);view.setUint32(24,sampleRate,true);view.setUint32(28,sampleRate*2,true);view.setUint16(32,2,true);view.setUint16(34,16,true);str(36,"data");view.setUint32(40,count*2,true);for(let i=0;i<count;i++){const envelope=Math.min(1,i/(sampleRate*.03),Math.max(0,(count-i)/(sampleRate*.05)));view.setInt16(44+i*2,Math.sin(2*Math.PI*440*i/sampleRate)*10000*envelope,true)}return new Blob([buffer],{type:"audio/wav"})}
async function makeVideo(){const canvas=document.createElement("canvas");canvas.width=320;canvas.height=240;const ctx=canvas.getContext("2d"),stream=canvas.captureStream(20),type=preferredMime(),options=type?{mimeType:type,videoBitsPerSecond:500000}:{videoBitsPerSecond:500000},rec=new MediaRecorder(stream,options),chunks=[];rec.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};const stopped=new Promise(resolve=>rec.onstop=resolve);rec.start(200);const start=performance.now();await new Promise(resolve=>{const draw=now=>{const t=(now-start)/1000;ctx.fillStyle="#162132";ctx.fillRect(0,0,320,240);ctx.fillStyle="#f3d469";ctx.beginPath();ctx.arc(40+220*Math.min(1,t/1.2),120+40*Math.sin(t*7),24,0,Math.PI*2);ctx.fill();ctx.fillStyle="#fff";ctx.font="bold 22px sans-serif";ctx.fillText("ROUTINE NOTE",66,42);if(t<1.25)requestAnimationFrame(draw);else resolve()};requestAnimationFrame(draw)});rec.stop();await stopped;stream.getTracks().forEach(track=>track.stop());const blob=new Blob(chunks,{type:rec.mimeType||type||"video/webm"});return{blob,duration:1.2,captureWidth:320,captureHeight:240,music:{blobId:"synthetic-audio",name:"Synthetic test tone",trimStart:0,trimEnd:3,fullDuration:3},syncAudioDelaySeconds:.1}}
(async()=>{try{sourceCapture=await makeVideo();$start.disabled=false;$start.textContent="1.2秒の合成テストを開始";$status.textContent=`素材準備完了 (${Math.round(sourceCapture.blob.size/1024)} KiB)`;$status.dataset.state="ready"}catch(error){$status.textContent=`準備失敗: ${error.message}`;$status.dataset.state="fail"}})();
$start.addEventListener("click",async()=>{if(!sourceCapture)return;$start.disabled=true;$status.textContent="合成中";$status.dataset.state="running";$progress.value=0;try{const result=await composeRunVideoAfterCapture({capture:sourceCapture,musicBlob:makeWav(),videoBitsPerSecond:500000,onProgress:(ratio,current,duration)=>{$progress.value=ratio;$status.textContent=`合成中 ${Math.round(ratio*100)}% (${current.toFixed(1)} / ${duration.toFixed(1)}秒)`}});$status.textContent="PASS: 映像と音源を1本へ合成できました";$status.dataset.state="pass";$metrics.textContent=`${result.mimeType} / ${Math.round(result.size/1024)} KiB / 処理 ${(result.elapsedMs/1000).toFixed(2)}秒`;$result.src=URL.createObjectURL(result.blob);$result.hidden=false}catch(error){$status.textContent=`FAIL [${error.code||"error"}]: ${error.message}`;$status.dataset.state="fail"}finally{$start.disabled=false;$start.textContent="もう一度テスト"}});
</script>
</body>
</html>
